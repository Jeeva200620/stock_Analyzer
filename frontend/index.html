<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse | Weekday Performance Analyzer</title>
    <meta name="description" content="Professional stock market analyzer. Discover historical weekday performance, win rates, and volatility for global stocks.">
    <link rel="stylesheet" href="/static/style.css?v=3">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i data-lucide="trending-up" style="color: var(--primary); width: 32px; height: 32px;"></i>
                <h1>StockPulse Analyzer</h1>
            </div>
            <p>Institutional-grade weekday performance analytics for global & Indian markets</p>
        </header>

        <section class="controls">
            <div class="control-group">
                <label for="csv-upload">Upload Stock CSV Data</label>
                <div style="position: relative;">
                    <i data-lucide="upload" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px;"></i>
                    <input type="file" id="csv-upload" accept=".csv" style="width: 100%; border: 1px solid var(--border); border-radius: 12px; background: rgba(0, 0, 0, 0.2); transition: all 0.3s; padding: 0.85rem 1rem 0.85rem 3rem; color: white;">
                </div>
            </div>
            <div class="control-group">
                <label for="weekday">Analysis Target</label>
                <div style="position: relative;">
                    <i data-lucide="calendar" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px;"></i>
                    <select id="weekday" style="padding-left: 3rem; width: 100%;">
                        <option value="Monday">Monday Sessions</option>
                        <option value="Tuesday">Tuesday Sessions</option>
                        <option value="Wednesday">Wednesday Sessions</option>
                        <option value="Thursday">Thursday Sessions</option>
                        <option value="Friday">Friday Sessions</option>
                    </select>
                </div>
            </div>
            <div class="control-group" style="min-width: 150px;">
                <label for="start-date">Start Date</label>
                <input type="date" id="start-date" style="padding-left: 1rem;">
            </div>
            <div class="control-group" style="min-width: 150px;">
                <label for="end-date">End Date</label>
                <input type="date" id="end-date" style="padding-left: 1rem;">
            </div>
            <div style="display: flex; gap: 0.75rem; align-items: flex-end;">
                <button id="analyze-btn">
                    <i data-lucide="zap" style="width: 18px;"></i>
                    Analyze
                </button>
                <button id="export-btn" style="background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main);">
                    <i data-lucide="download" style="width: 18px;"></i>
                    Export
                </button>
            </div>
        </section>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-weight: 500;">Crunching historical data points...</p>
        </div>

        <section id="results" class="main-content" style="display: none;">
            <!-- Summary Metrics -->
            <div class="card full-width">
                <h2><i data-lucide="bar-chart-2" style="color: var(--primary);"></i> Summary Metrics</h2>
                <div class="analytics-grid" id="metrics-container">
                    <!-- Metrics injected here -->
                </div>
            </div>

            <!-- Historical Log -->
            <div class="card full-width">
                <h2><i data-lucide="list" style="color: var(--primary);"></i> Historical Session Log</h2>
                <div class="table-wrapper">
                    <table id="weekday-data-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="rawDate">Session Date <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th>Weekday</th>
                                <th class="sortable" data-sort="open">Open <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="high">High <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="low">Low <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="close">Close <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="highLow">Range(H-L) <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="openHigh">H-O <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="openLow">O-L <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="volume">Volume <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                                <th class="sortable" data-sort="return_percent">Alpha (%) <i data-lucide="arrow-up-down" class="sort-icon"></i></th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Table data will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>


        </section>
    </div>

    <!-- Initialize Icons and App -->
    <script>
        lucide.createIcons();
    </script>
    <script src="/static/script.js?v=3"></script>
</body>
</html>
